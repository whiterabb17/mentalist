[package]
name = "mentalist"
version = "0.2.7"
edition = "2021"
authors = ["MindPalace Authors"]
license = "MIT"
[features]
default = []
wasm-tools = []

[dependencies]
mem-core = { path = "../mindpalace/crates/mem-core" }
brain = { path = "../mindpalace/crates/brain" }
mem-resilience = { path = "../mindpalace/crates/mem-resilience" }
mem-extractor = { path = "../mindpalace/crates/mem-extractor" }
mem-retriever = { path = "../mindpalace/crates/mem-retriever" }
mem-bridge = { path = "../mindpalace/crates/mem-bridge" }
mem-offloader = { path = "../mindpalace/crates/mem-offloader" }

tokio = { version = "1", features = ["full", "fs"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
async-trait = "0.1"
async-recursion = "1"
shlex = "1.3"
chrono = "0.4"
tracing-subscriber = "0.3"
clap = { version = "4.4", features = ["derive"] }
colored = "2.1"
bollard = "0.18"
futures-util = "0.3"
reqwest = { version = "0.12", features = ["json", "rustls-tls", "stream"] }
reqwest-eventsource = "0.6"
async-stream = "0.3"
wasmtime = { version = "29.0", features = ["async"] }
wasmtime-wasi = { version = "29.0", features = ["preview1"] }
cap-std = "3.4"
ruvector-core = "0.1"
