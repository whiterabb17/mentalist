[package]
name = "mentalist"
version = "0.3.1"
edition = "2021"
authors = ["MindPalace Authors"]
license = "MIT"
[features]
default = []
wasm-tools = []

[dependencies]
mem-core = { git = "https://github.com/whiterabb17/mindpalace.git" }
brain = { git = "https://github.com/whiterabb17/mindpalace.git" }
mem-resilience = { git = "https://github.com/whiterabb17/mindpalace.git" }
mem-extractor = { git = "https://github.com/whiterabb17/mindpalace.git" }
mem-retriever = { git = "https://github.com/whiterabb17/mindpalace.git" }
mem-bridge = { git = "https://github.com/whiterabb17/mindpalace.git" }
mem-offloader = { git = "https://github.com/whiterabb17/mindpalace.git" }

tokio = { version = "1", features = ["full", "fs"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
async-trait = "0.1"
async-recursion = "1"
shlex = "1.3"
chrono = "0.4"
tracing-subscriber = "0.3"
clap = { version = "4.4", features = ["derive"] }
colored = "2.1"
bollard = "0.18"
futures-util = "0.3"
reqwest = { version = "0.12", features = ["json", "rustls-tls", "stream"] }
reqwest-eventsource = "0.6"
async-stream = "0.3"
wasmtime = { version = "29.0", features = ["async"] }
wasmtime-wasi = { version = "29.0", features = ["preview1"] }
cap-std = "3.4"
ruvector-core = "0.1"

[dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }
brain = { git = "https://github.com/whiterabb17/mindpalace.git" }

[[bench]]
name = "bench_main"
harness = false
