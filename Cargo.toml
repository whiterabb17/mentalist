[package]
name = "mentalist"
version = "0.1.0"
edition = "2021"
authors = ["MindPalace Authors"]
license = "MIT"

[dependencies]
mem-core = { path = "../mindpalace/crates/mem-core" }
brain = { path = "../mindpalace/crates/brain" }
tokio = { version = "1", features = ["full", "fs"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
async-trait = "0.1"
async-recursion = "1"
shlex = "1.3"
chrono = "0.4"
tracing-subscriber = "0.3"
clap = { version = "4.4", features = ["derive"] }
colored = "2.0"
